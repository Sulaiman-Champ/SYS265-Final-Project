---
# ------------------------------------------------------------------------------
# PLAY 1: Install the prometheus.prometheus collection on the Ansible controller.
# This must run before any collection roles are referenced in subsequent plays.
# ------------------------------------------------------------------------------
- name: Install prometheus.prometheus collection on localhost
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Install prometheus.prometheus from Ansible Galaxy
      # ansible-galaxy is idempotent with --force omitted; skips if already installed
      ansible.builtin.command:
        cmd: ansible-galaxy collection install prometheus.prometheus
      register: galaxy_install
      changed_when: "'was installed' in galaxy_install.stdout"

# ------------------------------------------------------------------------------
# PLAY 2: Configure the remote Ubuntu Core host with Prometheus.
# ------------------------------------------------------------------------------
- name: Deploy Prometheus stack on remote host
  hosts: prometheus_targets
  become: true
  gather_facts: true

  collections:
    - prometheus.prometheus

  vars:
    node_exporter_version: latest
    node_exporter_web_listen_address: "0.0.0.0:9100"

    prometheus_version: latest
    prometheus_web_listen_address: "0.0.0.0:9090"
    prometheus_storage_retention: "15d"

    prometheus_scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets:
              - "localhost:9090"

      - job_name: "node"
        static_configs:
          - targets:
              - "localhost:9100"

  pre_tasks:
    - name: Ensure required dependency packages are present
      ansible.builtin.apt:
        name:
          - curl
          - tar
          - apt-transport-https
        state: present

  roles:
    - role: prometheus.prometheus.node_exporter
    - role: prometheus.prometheus.prometheus

  post_tasks:
    - name: Wait for Prometheus to be reachable
      ansible.builtin.uri:
        url: "http://localhost:9090/-/ready"
        status_code: 200
      register: prom_health
      retries: 10
      delay: 5
      until: prom_health.status == 200

    - name: Wait for Node Exporter to be reachable
      ansible.builtin.uri:
        url: "http://localhost:9100/metrics"
        status_code: 200
      register: node_health
      retries: 10
      delay: 5
      until: node_health.status == 200

    - name: Confirm both services are healthy
      ansible.builtin.debug:
        msg: "Prometheus and Node Exporter are up and responding."

    # Separate task — was incorrectly merged into the debug task previously
    - name: Add linux group hosts to Prometheus scrape config
      ansible.builtin.blockinfile:
        path: /etc/prometheus/prometheus.yml
        insertafter: EOF
        marker: "# {mark} ANSIBLE MANAGED BLOCK - linux node targets"
        block: |
          - job_name: "linux_nodes"
            static_configs:
              - targets:
                  {% for host in groups['linux'] %}
                  - "{{ hostvars[host]['ansible_host'] }}:9100"
                  {% endfor %}
      notify: Reload Prometheus

  # Handlers must be at play level, not nested inside post_tasks
  handlers:
    - name: Reload Prometheus
      ansible.builtin.uri:
        url: "http://localhost:9090/-/reload"
        method: POST
        status_code: 200

# ==============================================================================
# Inventory note (do not commit secrets — use Ansible Vault for passwords):
#
#   [prometheus_targets]
#   prometheus-host ansible_host=172.16.1.5 ansible_user=ubuntu
#
# Run with:
#   ansible-playbook -i inventory.ini playbook.yml
# ==============================================================================
