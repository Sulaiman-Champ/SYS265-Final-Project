---
# ==============================================================================
# Ansible Playbook: Install & Configure Prometheus via prometheus.prometheus
# Target: Ubuntu Core server at 172.16.1.15
# ==============================================================================

# ------------------------------------------------------------------------------
# PLAY 1: Configure the remote Ubuntu Core host with Prometheus.
# ------------------------------------------------------------------------------
- name: Deploy Prometheus stack on remote host
  hosts: prometheus_targets
  become: true
  gather_facts: true

  collections:
    - prometheus.prometheus

  vars:
    node_exporter_version: latest
    node_exporter_web_listen_address: "0.0.0.0:9100"

    prometheus_version: latest
    prometheus_web_listen_address: "0.0.0.0:9090"
    prometheus_storage_retention: "15d"

    prometheus_scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets:
              - "localhost:9090"

      - job_name: "node"
        static_configs:
          - targets:
              - "localhost:9100"

  pre_tasks:
    - name: Ensure required dependency packages are present
      ansible.builtin.apt:
        name:
          - curl
          - tar
          - apt-transport-https
        state: present

  roles:
    - role: prometheus.prometheus.node_exporter
    - role: prometheus.prometheus.prometheus

  post_tasks:
    - name: Wait for Prometheus to be reachable
      ansible.builtin.uri:
        url: "http://localhost:9090/-/ready"
        status_code: 200
      register: prom_health
      retries: 10
      delay: 5
      until: prom_health.status == 200

    - name: Wait for Node Exporter to be reachable
      ansible.builtin.uri:
        url: "http://localhost:9100/metrics"
        status_code: 200
      register: node_health
      retries: 10
      delay: 5
      until: node_health.status == 200

    - name: Confirm both services are healthy
      ansible.builtin.debug:
        msg: "Prometheus and Node Exporter are up and responding."

    - name: Add linux group hosts to Prometheus scrape config
      ansible.builtin.blockinfile:
        path: /etc/prometheus/prometheus.yml
        insertafter: EOF
        marker: "# {mark} ANSIBLE MANAGED BLOCK - linux node targets"
        block: |
          - job_name: "linux_nodes"
            static_configs:
              - targets:
                  # Uses inventory_hostname directly since linux group hosts
                  # are bare IPs with no ansible_host alias defined
                  {% for host in groups['linux'] %}
                  - "{{ host }}:9100"
                  {% endfor %}


# ==============================================================================
# Inventory (as provided):
#
#   [linux]
#   172.16.1.5
#   172.16.1.11
#   172.16.1.15
#   172.16.1.10
#
#   [prometheus_targets]
#   prometheus-host ansible_host=172.16.1.15
#
#   [windows]
#   172.16.1.12
#   172.16.1.13
#
#   [windows:vars]
#   ansible_shell_type=powershell
#
# Run with:
#   ansible-playbook -i inventory.ini playbook.yml
# ==============================================================================
